<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestor Local de Turnos de Enfermería</title>
    <style>
:root {
  --bg: #edf3f7;
  --bg-soft: #f7fafc;
  --surface: #ffffff;
  --surface-2: #f2f7fb;
  --text: #102a43;
  --muted: #62748a;
  --line: #d7e2ea;
  --line-strong: #c5d5df;
  --primary: #0b5f86;
  --primary-dark: #073d5f;
  --primary-soft: #e6f2f7;
  --teal: #0d9488;
  --teal-soft: #e3f7f4;
  --danger: #b42318;
  --warn: #b4690e;
  --ok: #13795b;
  --radius: 14px;
  --radius-sm: 9px;
  --shadow: 0 18px 42px rgba(16, 42, 67, 0.09);
  --shadow-hover: 0 22px 54px rgba(16, 42, 67, 0.14);
  --ease: 180ms ease;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-width: 320px;
  background:
    radial-gradient(circle at 80% -10%, rgba(13, 148, 136, 0.12), transparent 28%),
    linear-gradient(180deg, #f8fbfd 0%, var(--bg) 46%, #eaf1f6 100%);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 14px;
  overflow-x: hidden;
}

button, input, select, textarea { font: inherit; }

button {
  border: 1px solid transparent;
  border-radius: 10px;
  padding: 10px 14px;
  background: linear-gradient(135deg, var(--primary), #0d749d);
  color: #fff;
  cursor: pointer;
  font-size: 13px;
  font-weight: 720;
  letter-spacing: 0;
  box-shadow: 0 10px 22px rgba(11, 95, 134, 0.18);
  transition: transform var(--ease), box-shadow var(--ease), background var(--ease), border-color var(--ease);
}

button:hover { transform: translateY(-1px); box-shadow: 0 14px 28px rgba(11, 95, 134, 0.22); }
button:active { transform: translateY(0); box-shadow: 0 7px 16px rgba(11, 95, 134, 0.16); }
button.secondary { background: #edf5f9; color: var(--primary-dark); border-color: #cfe0e9; box-shadow: none; }
button.secondary:hover { background: #e4f0f6; border-color: #aac8d8; }
button.danger { background: linear-gradient(135deg, var(--danger), #c24132); }
button.ghost { background: transparent; color: var(--primary); padding: 7px 9px; border-color: transparent; box-shadow: none; }
button.ghost:hover { background: var(--primary-soft); box-shadow: none; }
button:disabled { opacity: .55; cursor: not-allowed; }

.app-shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 268px minmax(0, 1fr);
}

.sidebar {
  background: linear-gradient(180deg, #073d5f 0%, #0a4f70 54%, #083853 100%);
  color: #e9f7ff;
  padding: 22px 16px;
  position: sticky;
  top: 0;
  height: 100vh;
  min-width: 0;
  box-shadow: 12px 0 32px rgba(16, 42, 67, 0.12);
}

.brand-block { display: flex; align-items: center; gap: 12px; margin-bottom: 26px; }
.brand-mark {
  width: 42px;
  height: 42px;
  display: grid;
  place-items: center;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.12);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: #fff;
  font-weight: 820;
}
.brand { font-size: 17px; line-height: 1.15; font-weight: 760; overflow-wrap: anywhere; }
.brand-subtitle { margin-top: 3px; color: #bfe7f5; font-size: 12px; font-weight: 650; }
.nav { display: grid; gap: 6px; }

.nav-button {
  width: 100%;
  text-align: left;
  background: transparent;
  color: #e9f7ff;
  border: 1px solid transparent;
  box-shadow: none;
  border-radius: 10px;
  padding: 11px 12px;
}
.nav-button:hover { background: rgba(255,255,255,.10); transform: translateX(2px); box-shadow: none; }
.nav-button.active { background: rgba(255,255,255,.16); border-color: rgba(255,255,255,.18); }

.status-pill {
  margin-top: 30px;
  padding: 13px;
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.07);
  color: #d9f3fb;
  font-size: 12px;
}
.status-pill strong { display: block; color: #fff; margin-bottom: 5px; }
.status-pill span { display: block; line-height: 1.35; }

.main { min-width: 0; display: flex; flex-direction: column; }

.topbar {
  display: grid;
  grid-template-columns: minmax(128px, 190px) minmax(0, 1fr) minmax(136px, 220px);
  gap: 18px;
  align-items: center;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  padding: 18px 24px 16px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.institution-logo {
  min-height: 74px;
  min-width: 0;
  display: flex;
  align-items: center;
  padding: 10px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 13px;
  box-shadow: 0 10px 24px rgba(16, 42, 67, 0.07);
}
.institution-logo img { display: block; max-width: 100%; max-height: 56px; object-fit: contain; }
.logo-right { justify-content: flex-end; }

.header-copy { text-align: center; min-width: 0; }
.topbar h1 { margin: 0; font-size: 26px; line-height: 1.15; letter-spacing: 0; overflow-wrap: anywhere; }
.topbar h1 span { display: inline; }
.topbar h1 span + span::before { content: " "; }
.topbar p { margin: 7px 0 0; color: var(--muted); font-size: 14px; font-weight: 650; }
.topbar p span:not(:last-child)::after { content: " · "; }

.privacy-badges {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}
.privacy-badges span {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  padding: 5px 10px;
  border-radius: 999px;
  background: var(--teal-soft);
  color: #075e57;
  border: 1px solid #bee7df;
  font-size: 12px;
  font-weight: 760;
}

.contextbar {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  padding: 12px 24px;
  color: var(--muted);
  background: rgba(255,255,255,.7);
  border-bottom: 1px solid var(--line);
}
.contextbar strong { color: #344f68; }

.content {
  flex: 1;
  padding: 22px 24px 28px;
}

.section { display: none; }
.section.active { display: block; }

.grid { display: grid; gap: 16px; }
.grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
.dashboard-grid { margin-top: 16px; }

.hero-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.7fr) minmax(300px, .8fr);
  gap: 16px;
  margin-bottom: 16px;
}

.hero-panel,
.privacy-panel,
.card {
  background: rgba(255,255,255,.94);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.hero-panel {
  min-height: 260px;
  display: grid;
  align-content: space-between;
  padding: 26px;
  overflow: hidden;
  position: relative;
}
.hero-panel::after {
  content: "";
  position: absolute;
  inset: auto -80px -120px auto;
  width: 260px;
  height: 260px;
  border-radius: 50%;
  background: rgba(13, 148, 136, .12);
}
.hero-copy { position: relative; z-index: 1; max-width: 760px; }
.hero-copy h2 { margin: 0; font-size: 31px; line-height: 1.13; letter-spacing: 0; }
.hero-copy p { margin: 14px 0 0; color: #50677d; font-size: 15px; line-height: 1.6; max-width: 700px; }
.hero-stats {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-top: 22px;
}
.hero-stats div {
  padding: 13px;
  border-radius: 12px;
  background: var(--bg-soft);
  border: 1px solid var(--line);
}
.hero-stats strong { display: block; font-size: 21px; color: var(--primary-dark); }
.hero-stats span { display: block; margin-top: 4px; color: var(--muted); font-size: 12px; font-weight: 700; }

.privacy-panel {
  padding: 20px;
  background: linear-gradient(180deg, #ffffff, #f4faf9);
}
.privacy-panel h3, .privacy-panel h2 { margin: 0 0 12px; }
.privacy-panel ul { margin: 0; padding-left: 18px; display: grid; gap: 9px; color: #38566c; line-height: 1.45; }
.privacy-panel.full-width { max-width: 920px; }

.card {
  padding: 18px;
  margin-bottom: 16px;
  transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease);
}
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); border-color: var(--line-strong); }
.card h2, .card h3 { margin: 0 0 12px; }
.evidence-card { margin-top: 16px; }

.section-heading { margin-bottom: 16px; }
.section-heading h2, .section-heading h3 { margin: 0; }
.section-heading p { margin: 6px 0 0; color: var(--muted); line-height: 1.45; }

.metric {
  min-height: 120px;
  display: grid;
  align-content: space-between;
  border-top: 4px solid var(--primary);
}
.metric .value { font-size: 32px; font-weight: 820; margin-top: 8px; color: #082f49; }
.metric .label { color: #48647b; font-size: 13px; font-weight: 760; }
.metric-detail { color: var(--muted); font-size: 12px; margin-top: 8px; }

.form-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(160px, 1fr));
  gap: 13px;
}
.wide-field { grid-column: span 3; }
.compact-field { max-width: 260px; }
.calendar-toolbar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: end;
}
.recalculate-button { min-height: 42px; }
label { display: grid; gap: 6px; color: #4b6478; font-size: 12px; font-weight: 760; }
.checkbox-label {
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 42px;
}
.checkbox-label input {
  width: auto;
  margin: 0;
}
input, select, textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: #fff;
  color: var(--text);
  padding: 10px 11px;
  transition: border-color var(--ease), box-shadow var(--ease), background var(--ease);
}
input:focus, select:focus, textarea:focus {
  outline: 0;
  border-color: #5aa9c8;
  box-shadow: 0 0 0 4px rgba(90, 169, 200, .16);
}
.actions { display: flex; gap: 9px; flex-wrap: wrap; align-items: center; margin-top: 12px; }
.turno-palette { align-content: start; margin-top: 20px; }

.table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface);
}
table { border-collapse: separate; border-spacing: 0; width: 100%; }
th, td {
  padding: 10px 11px;
  border-bottom: 1px solid var(--line);
  border-right: 1px solid var(--line);
  text-align: left;
  white-space: nowrap;
}
th {
  background: #eef6fa;
  font-size: 12px;
  color: #2f5068;
  position: sticky;
  top: 0;
  z-index: 2;
  font-weight: 800;
}
td { color: #243f56; }
tbody tr:nth-child(even) td { background-color: #fbfdfe; }
tbody tr:hover td { background-color: #f2f8fb; }
td:last-child, th:last-child { border-right: 0; }
tr:last-child td { border-bottom: 0; }

.calendar th:first-child, .calendar td:first-child {
  position: sticky;
  left: 0;
  z-index: 3;
  background: #fff;
  min-width: 210px;
}
.calendar th:first-child { background: #eef6fa; z-index: 4; }
.day-head { text-align: center; min-width: 44px; }
.weekend { background: #eef3f6 !important; }
.today { outline: 2px solid var(--teal); outline-offset: -2px; }
.shift-cell { text-align: center; font-weight: 820; color: #123047; }
.shift-cell:hover { filter: saturate(1.08); }
.shift-cell[data-action="edit-incidencia"] { cursor: pointer; }
.incidence-cell {
  color: #351f4f;
  box-shadow: inset 0 0 0 2px rgba(53, 31, 79, .15);
}
.incidence-legend {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-top: 14px;
  color: var(--muted);
  font-weight: 760;
}
.incidence-legend span {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.summary-toggle { margin-top: 14px; max-width: max-content; }
.calendar .summary-title td {
  position: static;
  background: #e2f0f6 !important;
  color: #123047;
  border-top: 2px solid var(--line-strong);
  font-weight: 820;
}
.summary-row td:first-child,
.summary-total td:first-child {
  background: #f8fbfd;
  font-weight: 800;
}
.summary-count {
  text-align: center;
  font-weight: 760;
  color: #123047;
}
.summary-total td { background: #eef6fa !important; font-weight: 820; }
.summary-total.active-total td { background: #ecf8f6 !important; }

.muted { color: var(--muted); }
.badge, .shift-code {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  padding: 4px 9px;
  min-height: 24px;
  font-size: 12px;
  font-weight: 820;
}
.badge.ok { background: #e7f6ef; color: var(--ok); }
.badge.warn { background: #fff4df; color: var(--warn); }
.badge.danger { background: #ffe8e5; color: var(--danger); }
.shift-code { color: #143047; border: 1px solid rgba(16,42,67,.12); }

.sequence { display: flex; gap: 6px; flex-wrap: wrap; }
.sequence span {
  padding: 6px 10px;
  border-radius: 8px;
  background: #eaf4fa;
  color: #123047;
  font-weight: 820;
}
.cycle-card h3 { color: #123047; }

.notice {
  border-left: 4px solid var(--teal);
  background: #edfafa;
  padding: 12px 13px;
  border-radius: 10px;
  color: #165d57;
}
.notice-ok { border-left-color: var(--ok); background: #e7f6ef; color: #0f513f; margin-bottom: 14px; }
.notice-warn { border-left-color: var(--warn); background: #fff4df; color: #74420a; margin-bottom: 14px; }
.file-input { padding: 8px; background: #fff; }
.hidden-input { display: none; }
.backup-card {
  display: grid;
  align-content: start;
  gap: 10px;
}
.backup-card h3 { margin-bottom: 0; }
.backup-meta {
  display: grid;
  gap: 4px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--bg-soft);
}
.backup-meta strong { color: #344f68; font-size: 12px; }
.backup-meta span { color: var(--muted); }

.app-footer {
  padding: 18px 24px 24px;
  color: #62748a;
  border-top: 1px solid var(--line);
  background: rgba(255,255,255,.58);
  font-size: 12px;
  text-align: center;
}

@keyframes panelIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 1ms !important;
    transition-duration: 1ms !important;
    scroll-behavior: auto !important;
  }
}

@media (max-width: 1120px) {
  .topbar { grid-template-columns: 140px minmax(0, 1fr) 150px; }
  .hero-grid { grid-template-columns: 1fr; }
  .grid.cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

@media (max-width: 980px) {
  .app-shell { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .nav { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .grid.cols-3, .grid.cols-2 { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr 1fr; }
  .wide-field { grid-column: span 2; }
}

@media (max-width: 760px) {
  .app-shell, .main, .sidebar, .topbar, .content {
    width: 100%;
    max-width: 100vw;
    min-width: 0;
  }
  .topbar {
    position: static;
    grid-template-columns: minmax(0, 1fr);
    padding: 14px;
    max-width: 100vw;
    overflow: hidden;
  }
  .header-copy {
    grid-column: 1;
    grid-row: auto;
    width: 100%;
    max-width: calc(100vw - 28px);
    justify-self: center;
  }
  .logo-left, .logo-right {
    grid-column: 1;
    grid-row: auto;
    width: 100%;
    max-width: calc(100vw - 28px);
    min-height: 64px;
    justify-content: center;
  }
  .topbar h1 { max-width: 100%; font-size: 19px; line-height: 1.2; white-space: normal; }
  .topbar h1 span { display: block; }
  .topbar h1 span + span::before { content: ""; }
  .topbar p { max-width: 100%; font-size: 12px; line-height: 1.4; white-space: normal; }
  .topbar p span { display: block; }
  .topbar p span:not(:last-child)::after { content: ""; }
  .contextbar { padding: 11px 14px; gap: 10px; }
  .content { padding: 14px; }
  .hero-panel { padding: 20px; min-height: auto; }
  .hero-copy h2 { font-size: 24px; }
  .hero-stats { grid-template-columns: 1fr; }
  .grid.cols-4 { grid-template-columns: 1fr; }
}

@media (max-width: 620px) {
  .form-grid { grid-template-columns: 1fr; }
  .wide-field { grid-column: auto; }
  .nav { grid-template-columns: 1fr 1fr; }
  .topbar h1, .topbar p, .contextbar { overflow-wrap: anywhere; }
  .privacy-badges { justify-content: center; }
  .institution-logo img { max-height: 46px; }
}

    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
"use strict";

// ---- src/js/utils/dateUtils.js ----
const DAY_MS = 24 * 60 * 60 * 1000;

function parseIsoDateUtc(value) {
  const iso = normalizarFechaIso(value);
  if (!iso) return null;
  const [year, month, day] = iso.split("-").map(Number);
  return Date.UTC(year, month - 1, day);
}

function diferenciaDiasUtc(fechaA, fechaB) {
  const timeA = parseIsoDateUtc(fechaA);
  const timeB = parseIsoDateUtc(fechaB);
  if (timeA === null || timeB === null) return NaN;
  return Math.round((timeA - timeB) / DAY_MS);
}

function parseDate(value) {
  const time = parseIsoDateUtc(value);
  return time === null ? null : new Date(time);
}

function formatDate(date) {
  return date.toISOString().slice(0, 10);
}

function daysBetween(startDate, endDate) {
  return diferenciaDiasUtc(endDate, startDate);
}

function daysInMonth(year, monthIndex) {
  return new Date(Date.UTC(year, monthIndex + 1, 0)).getUTCDate();
}

function monthDates(year, monthIndex) {
  const total = daysInMonth(year, monthIndex);
  return Array.from({ length: total }, (_, index) => formatDate(new Date(Date.UTC(year, monthIndex, index + 1))));
}

function weekdayIndex(dateString) {
  return parseDate(dateString).getUTCDay();
}

function isWithinRange(dateString, startDate, endDate) {
  if (startDate && daysBetween(startDate, dateString) < 0) return false;
  if (endDate && daysBetween(dateString, endDate) < 0) return false;
  return true;
}

function esFechaIsoValida(value) {
  return normalizarFechaIso(value) === value;
}

function normalizarFechaIso(value) {
  if (!value) return "";
  const text = String(value).trim();
  const iso = /^(\d{4})-(\d{2})-(\d{2})$/.exec(text);
  if (iso) return fechaIsoSiExiste(Number(iso[1]), Number(iso[2]), Number(iso[3]));
  const legacyEs = /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec(text);
  if (legacyEs) return fechaIsoSiExiste(Number(legacyEs[3]), Number(legacyEs[2]), Number(legacyEs[1]));
  return "";
}

function fechaIsoSiExiste(year, month, day) {
  if (!Number.isInteger(year) || !Number.isInteger(month) || !Number.isInteger(day)) return "";
  const time = Date.UTC(year, month - 1, day);
  const date = new Date(time);
  if (date.getUTCFullYear() !== year || date.getUTCMonth() !== month - 1 || date.getUTCDate() !== day) return "";
  return `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
}

const GRUPOS_COBERTURA = ["manana", "tarde", "noche", "diurno12", "nocturno12", "libre", "otro"];

function crearTurnosIniciales() {
  return [
    turno("M", "Manana", "08:00", "15:00", 7, "manana", "#f8d66d", false, 1, true),
    turno("T", "Tarde", "15:00", "22:00", 7, "tarde", "#f5a85b", false, 2, true),
    turno("N", "Noche", "22:00", "08:00", 10, "noche", "#6fa8dc", true, 3, true),
    turno("D12", "Diurno 12 h", "08:00", "20:00", 12, "diurno12", "#b7d7f4", false, 4, true),
    turno("N12", "Nocturno 12 h", "20:00", "08:00", 12, "noche", "#4b8ccc", true, 5, true),
    turno("L", "Libre", "", "", 0, "libre", "#b7dfae", false, 6, false),
  ];
}

function turno(codigo, nombre, inicio, fin, horasComputables, grupoCobertura, color, cruzaMedianoche, ordenVisual = 0, cuentaComoPresencia = Number(horasComputables) > 0) {
  return {
    id: crypto.randomUUID(),
    codigo,
    nombre,
    inicio,
    fin,
    horasComputables: Number(horasComputables),
    grupoCobertura,
    color,
    cruzaMedianoche: Boolean(cruzaMedianoche),
    ordenVisual: Number(ordenVisual || 0),
    cuentaComoPresencia: Boolean(cuentaComoPresencia),
    activo: true,
  };
}

function validarTurno(turnoActual, turnos) {
  const errores = [];
  if (!turnoActual.codigo || turnoActual.codigo.length > 6) errores.push("El codigo es obligatorio y debe ser corto.");
  if (!turnoActual.nombre) errores.push("El nombre del turno es obligatorio.");
  if (Number(turnoActual.horasComputables) < 0) errores.push("Las horas computables no pueden ser negativas.");
  if (!/^#[0-9a-f]{6}$/i.test(turnoActual.color)) errores.push("El color debe ser hexadecimal.");
  const duplicado = turnos.some((item) => item.codigo.toUpperCase() === turnoActual.codigo.toUpperCase() && item.id !== turnoActual.id);
  if (duplicado) errores.push("Ya existe un turno con ese codigo.");
  return errores;
}

function buscarTurnoPorCodigo(turnos, codigo) {
  return turnos.find((turnoItem) => turnoItem.codigo.toUpperCase() === String(codigo).toUpperCase()) || null;
}

function moduloPositivo(n, m) {
  if (!m) throw new Error("La longitud del ciclo debe ser mayor que cero.");
  return ((n % m) + m) % m;
}

function parsearSecuencia(texto) {
  return String(texto)
    .split(/[\s,;·|\-]+/u)
    .map((item) => item.trim())
    .filter(Boolean);
}

function validarSecuencia(codigos, turnos) {
  const errores = [];
  if (!codigos.length) errores.push("El ciclo necesita al menos una posicion.");
  const noEncontrados = codigos.filter((codigo) => !buscarTurnoPorCodigo(turnos, codigo));
  if (noEncontrados.length) errores.push(`Turnos no encontrados: ${[...new Set(noEncontrados)].join(", ")}`);
  return errores;
}

function crearCiclo(nombre, codigos, turnos) {
  const errores = validarSecuencia(codigos, turnos);
  if (errores.length) throw new Error(errores.join(" "));
  return {
    id: crypto.randomUUID(),
    nombre,
    codigos,
    activo: true,
    archivado: false,
  };
}

function turnoParaFecha(ciclo, fechaConsultada, fechaInicioCiclo, posicionInicial, daysBetweenFn) {
  if (!ciclo || !ciclo.codigos?.length || !fechaInicioCiclo) return null;
  const diasTranscurridos = daysBetweenFn(fechaConsultada, fechaInicioCiclo);
  const indice = moduloPositivo(diasTranscurridos + Number(posicionInicial || 0), ciclo.codigos.length);
  return ciclo.codigos[indice];
}

function resumenCiclo(ciclo, turnos) {
  const resumen = {
    longitud: ciclo?.codigos?.length || 0,
    horasTotales: 0,
    mananas: 0,
    tardes: 0,
    noches: 0,
    turnos12: 0,
    libres: 0,
    otros: 0,
    promedioSemanal: 0,
  };
  for (const codigo of ciclo?.codigos || []) {
    const turno = buscarTurnoPorCodigo(turnos, codigo);
    if (!turno) continue;
    resumen.horasTotales += Number(turno.horasComputables || 0);
    if (turno.grupoCobertura === "manana") resumen.mananas += 1;
    else if (turno.grupoCobertura === "tarde") resumen.tardes += 1;
    else if (turno.grupoCobertura === "noche") resumen.noches += 1;
    else if (turno.grupoCobertura === "libre") resumen.libres += 1;
    else resumen.otros += 1;
    if (Number(turno.horasComputables) >= 12) resumen.turnos12 += 1;
  }
  resumen.promedioSemanal = resumen.longitud ? (resumen.horasTotales / resumen.longitud) * 7 : 0;
  return resumen;
}

const MODALIDADES = [
  { id: "diurno", nombre: "Diurno", tipo: "fijo", key: "turnoDiurno" },

  { id: "suap", nombre: "SUAP", tipo: "fijo", key: "suap" },

function obtenerFilaPonderacion(numeroNoches) {
  return PERFIL_NORMATIVO_SESCAM_2019.tablaPonderacion.find((fila) => fila.numero_noches === Number(numeroNoches)) || null;
}

function calcularJornadaObjetivo({ modalidad, porcentajeJornada = 100, noches = 0, jornadaPersonalizada = 0, jornadaManual = null }) {
  const porcentaje = Number(porcentajeJornada || 100) / 100;
  const modalidadInfo = MODALIDADES.find((item) => item.id === modalidad) || MODALIDADES[0];
  let base = 0;
  let origen = "valor fijo";
  let filaPonderacion = null;
  let advertencia = "";

  if (modalidadInfo.tipo === "tabla") {
    filaPonderacion = obtenerFilaPonderacion(noches);
    if (!filaPonderacion) {
      advertencia = "Numero de noches fuera de la tabla oficial disponible.";
      base = 0;
    } else {
      base = Number(filaPonderacion.jornada_realizar);
      origen = "tabla de ponderacion";
    }
  } else if (modalidadInfo.tipo === "manual") {
    base = Number(jornadaPersonalizada || 0);
    origen = "valor personalizado";
  } else {
    base = Number(PERFIL_NORMATIVO_SESCAM_2019.jornadasFijas[modalidadInfo.key]);
  }

  const automatica = roundHours(base * porcentaje);
  const objetivo = jornadaManual !== null && jornadaManual !== "" ? Number(jornadaManual) : automatica;

  return {
    modalidad: modalidadInfo,
    base,
    porcentaje,
    automatica,
    objetivo,
    origen,
    filaPonderacion,
    advertencia,
  };
}

function requiereAdvertenciaProrrata(profesional, year) {
  const inicio = `${year}-01-01`;
  const fin = `${year}-12-31`;
  return Boolean((profesional.fechaInicio && profesional.fechaInicio > inicio) || (profesional.fechaFin && profesional.fechaFin < fin));
}

function roundHours(value) {

}



// ---- src/js/domain/orden.js ----
function obtenerProfesionalesOrdenados(profesionales = []) {
  return [...profesionales].sort(compararOrdenVisual);
}

function compararOrdenVisual(a, b) {
  const ordenA = numeroOrden(a?.ordenVisual);
  const ordenB = numeroOrden(b?.ordenVisual);
  if (ordenA !== ordenB) return ordenA - ordenB;
  const nombre = String(a?.nombre || "").localeCompare(String(b?.nombre || ""), "es", { sensitivity: "base" });
  if (nombre !== 0) return nombre;
  return String(a?.id || "").localeCompare(String(b?.id || ""), "es", { sensitivity: "base" });
}

function normalizarOrdenProfesionales(profesionales = []) {
  obtenerProfesionalesOrdenados(profesionales).forEach((profesional, index) => {
    profesional.ordenVisual = index + 1;
  });
  return profesionales;
}

function moverProfesional(profesionales = [], profesionalId, direccion) {
  const ordenados = obtenerProfesionalesOrdenados(profesionales);
  const index = ordenados.findIndex((profesional) => profesional.id === profesionalId);
  const destino = index + Number(direccion);
  if (index < 0 || destino < 0 || destino >= ordenados.length) return profesionales;
  [ordenados[index].ordenVisual, ordenados[destino].ordenVisual] = [ordenados[destino].ordenVisual, ordenados[index].ordenVisual];
  return normalizarOrdenProfesionales(profesionales);
}

function obtenerTurnosOrdenados(turnos = []) {
  return [...turnos].sort((a, b) => {
    const ordenA = numeroOrden(a?.ordenVisual);
    const ordenB = numeroOrden(b?.ordenVisual);
    if (ordenA !== ordenB) return ordenA - ordenB;
    const grupo = String(a?.grupoCobertura || "").localeCompare(String(b?.grupoCobertura || ""), "es", { sensitivity: "base" });
    if (grupo !== 0) return grupo;
    return String(a?.codigo || "").localeCompare(String(b?.codigo || ""), "es", { sensitivity: "base" });
  });
}

function numeroOrden(value) {
  const numero = Number(value);
  return Number.isFinite(numero) ? numero : Number.MAX_SAFE_INTEGER;
}


// ---- src/js/domain/incidencias.js ----
const ESCENARIO_OFICIAL = "escenario-oficial";

const TIPOS_INCIDENCIA = {
  V: {
    codigo: "V",
    nombre: "Vacaciones",
    campoHoras: "horasVacaciones",
    campoBolsa: "bolsaVacacionesHoras",
    color: "#ffe6b8",
  },
  LD: {
    codigo: "LD",
    nombre: "Libre disposicion",
    campoHoras: "horasLibreDisposicion",
    campoBolsa: "bolsaLibreDisposicionHoras",
    color: "#e8ddf7",
  },
};

const BOLSAS_AUSENCIAS_BASE = {
  vacacionesHoras: 154,
  libreDisposicionHoras: 42,
};

function crearConfiguracionAusenciasBase() {
  return {
    vacacionesHoras: BOLSAS_AUSENCIAS_BASE.vacacionesHoras,
    libreDisposicionHoras: BOLSAS_AUSENCIAS_BASE.libreDisposicionHoras,
    proporcionalJornada: true,
  };
}

function obtenerIncidencia(state, profesionalId, fecha, escenarioId = ESCENARIO_OFICIAL) {
  return (state.incidenciasDiarias || []).find((incidencia) => (
    incidencia.profesionalId === profesionalId
    && incidencia.fecha === fecha
    && (incidencia.escenarioId || ESCENARIO_OFICIAL) === escenarioId
  )) || null;
}

function aplicarIncidencia(state, profesional, diaBase, tipoIncidencia, escenarioId = ESCENARIO_OFICIAL, now = new Date().toISOString()) {
  if (!TIPOS_INCIDENCIA[tipoIncidencia]) throw new Error("Tipo de incidencia no valido.");
  if (!diaBase?.codigo || diaBase.fueraContrato || diaBase.sinCiclo) throw new Error("No se puede aplicar una incidencia en una celda sin turno generado.");
  if (!profesional?.activo) throw new Error("No se puede aplicar una incidencia a un profesional inactivo.");
  state.incidenciasDiarias ??= [];
  const existente = obtenerIncidencia(state, profesional.id, diaBase.fecha, escenarioId);
  const payload = {
    id: existente?.id || crypto.randomUUID(),
    profesionalId: profesional.id,
    fecha: diaBase.fecha,
    escenarioId,
    turnoBaseId: diaBase.turnoId || "",
    codigoTurnoBase: diaBase.codigo,
    horasTurnoBase: Number(diaBase.horas || 0),
    tipoIncidencia,
    creadoEn: existente?.creadoEn || now,
    actualizadoEn: now,
  };
  if (existente) Object.assign(existente, payload);
  else state.incidenciasDiarias.push(payload);
  return payload;
}

function eliminarIncidencia(state, profesionalId, fecha, escenarioId = ESCENARIO_OFICIAL) {
  const before = state.incidenciasDiarias?.length || 0;
  state.incidenciasDiarias = (state.incidenciasDiarias || []).filter((incidencia) => !(
    incidencia.profesionalId === profesionalId
    && incidencia.fecha === fecha
    && (incidencia.escenarioId || ESCENARIO_OFICIAL) === escenarioId
  ));
  return before !== state.incidenciasDiarias.length;
}

function resolverDiaConIncidencia(state, profesional, diaBase, fecha) {
  const incidencia = obtenerIncidencia(state, profesional.id, fecha);
  const horasBaseActuales = Number(diaBase?.horas || 0);
  if (!incidencia || !diaBase?.codigo || diaBase.fueraContrato || diaBase.sinCiclo) {
    return {
      ...diaBase,
      codigoBase: diaBase?.codigo || "",
      horasBase: horasBaseActuales,
      horasEfectivas: horasBaseActuales,
      horasVacaciones: 0,
      horasLibreDisposicion: 0,
      incidencia: null,
      codigoVisible: diaBase?.codigo || "",
      colorIncidencia: "",
      cuentaComoPresencia: true,
    };
  }
  const tipo = TIPOS_INCIDENCIA[incidencia.tipoIncidencia];
  const horasDescontadas = horasBaseActuales;
  return {
    ...diaBase,
    codigoBase: diaBase.codigo,
    horasBase: horasBaseActuales,
    horas: 0,
    horasEfectivas: 0,
    horasVacaciones: tipo.codigo === "V" ? horasDescontadas : 0,
    horasLibreDisposicion: tipo.codigo === "LD" ? horasDescontadas : 0,
    incidencia: {
      ...incidencia,
      codigoTurnoBaseActual: diaBase.codigo,
      horasTurnoBaseActual: horasBaseActuales,
      horasOriginalesIncidencia: Number(incidencia.horasTurnoBase || 0),
      horasAlteradas: Number(incidencia.horasTurnoBase || 0) !== horasBaseActuales,
    },
    codigoVisible: tipo.codigo,
    colorIncidencia: tipo.color,
    cuentaComoPresencia: false,
    esNoche: false,
  };
}

function calcularDerechosAusencias(profesional, config = {}) {
  const porcentaje = Number(profesional?.porcentajeJornada || 100) / 100;
  const proporcional = config.ausencias?.proporcionalJornada !== false;
  const factor = proporcional ? porcentaje : 1;
  return {
    vacaciones: roundHours(Number(config.ausencias?.vacacionesHoras ?? BOLSAS_AUSENCIAS_BASE.vacacionesHoras) * factor),
    libreDisposicion: roundHours(Number(config.ausencias?.libreDisposicionHoras ?? BOLSAS_AUSENCIAS_BASE.libreDisposicionHoras) * factor),
    regla: proporcional ? "Proporcional al porcentaje de jornada" : "Bolsa completa no prorrateada",
  };
}

function calcularSaldosAusencias(profesional, horasVacaciones = 0, horasLibreDisposicion = 0, config = {}) {
  const derechos = calcularDerechosAusencias(profesional, config);
  return {
    vacaciones: {
      derecho: derechos.vacaciones,
      utilizadas: roundHours(horasVacaciones),
      pendientes: roundHours(Math.max(0, derechos.vacaciones - horasVacaciones)),
      exceso: roundHours(Math.max(0, horasVacaciones - derechos.vacaciones)),
    },
    libreDisposicion: {
      derecho: derechos.libreDisposicion,
      utilizadas: roundHours(horasLibreDisposicion),
      pendientes: roundHours(Math.max(0, derechos.libreDisposicion - horasLibreDisposicion)),
      exceso: roundHours(Math.max(0, horasLibreDisposicion - derechos.libreDisposicion)),
    },
    regla: derechos.regla,
  };
}

function calcularUsoActualIncidencias(state, calendario, profesionalId, tipoIncidencia) {
  let total = 0;
  const profesional = state.profesionales.find((item) => item.id === profesionalId);
  if (!profesional) return 0;
  for (const incidencia of state.incidenciasDiarias || []) {
    if (incidencia.profesionalId !== profesionalId || incidencia.tipoIncidencia !== tipoIncidencia) continue;
    const diaBase = calendario[profesionalId]?.[incidencia.fecha];
    const resuelto = resolverDiaConIncidencia(state, profesional, diaBase, incidencia.fecha);
    total += tipoIncidencia === "V" ? resuelto.horasVacaciones : resuelto.horasLibreDisposicion;
  }
  return roundHours(total);
}

function roundHours(value) {
  return Math.round((Number(value || 0) + Number.EPSILON) * 100) / 100;
}

function generarCalendarioAnual(state) {
  const year = Number(state.config.anioActivo);
  const resultado = {};
  for (const profesional of state.profesionales) {
    resultado[profesional.id] = {};
    for (let month = 0; month < 12; month += 1) {
      for (const fecha of monthDates(year, month)) {
        resultado[profesional.id][fecha] = generarDia(profesional, fecha, state);
      }
    }
  }
  return resultado;
}

function generarDia(profesional, fecha, state) {
  if (!profesional.activo || !isWithinRange(fecha, profesional.fechaInicio, profesional.fechaFin)) {
    return { fecha, codigo: "", horas: 0, esNoche: false, fueraContrato: true };
  }
  const ciclo = state.ciclos.find((item) => item.id === profesional.cicloId && item.activo && !item.archivado);
  const fechaInicioCiclo = normalizarFechaIso(profesional.fechaInicioCiclo);
  const codigo = turnoParaFecha(ciclo, fecha, fechaInicioCiclo, profesional.posicionInicial, diferenciaDiasUtc);
  if (!codigo) return { fecha, codigo: "", horas: 0, esNoche: false, sinCiclo: true };
  const turno = buscarTurnoPorCodigo(state.turnos, codigo);
  if (!turno) return { fecha, codigo, horas: 0, esNoche: false, error: "Turno no encontrado" };
  return {
    fecha,
    codigo: turno.codigo,
    horas: Number(turno.horasComputables || 0),
    esNoche: turno.grupoCobertura === "noche",
    grupoCobertura: turno.grupoCobertura,
    turnoId: turno.id,
  };
}

function diagnosticarTurnoProfesional(state, profesionalId, fechaConsultada) {
  const profesional = state.profesionales.find((item) => item.id === profesionalId);
  if (!profesional) return null;
  const ciclo = state.ciclos.find((item) => item.id === profesional.cicloId && item.activo && !item.archivado);
  const longitudCiclo = ciclo?.codigos?.length || 0;
  const fechaInicioCicloNormalizada = normalizarFechaIso(profesional.fechaInicioCiclo);
  const diasTranscurridos = ciclo && fechaInicioCicloNormalizada ? diferenciaDiasUtc(fechaConsultada, fechaInicioCicloNormalizada) : null;
  const indiceCalculado = longitudCiclo && diasTranscurridos !== null ? moduloPositivo(diasTranscurridos + Number(profesional.posicionInicial || 0), longitudCiclo) : null;
  return {
    profesionalId: profesional.id,
    nombre: profesional.nombre,
    ordenVisual: profesional.ordenVisual,
    cicloId: profesional.cicloId,
    fechaInicioCiclo: profesional.fechaInicioCiclo,
    fechaInicioCicloNormalizada,
    posicionInicial: Number(profesional.posicionInicial || 0),
    fechaConsultada,
    diasTranscurridos,
    indiceCalculado,
    turnoResultante: indiceCalculado !== null ? ciclo.codigos[indiceCalculado] : null,
  };
}


// ---- src/js/domain/calculoJornada.js ----




function calcularResumenProfesional(profesional, calendario, state) {
  const year = Number(state.config.anioActivo);
  const dias = calendario[profesional.id] || {};
  const horasMes = [];
  let total = 0;
  let totalBasePrevisto = 0;
  let horasVacaciones = 0;
  let horasLibreDisposicion = 0;
  let noches = 0;
  const desglose = { mananas: 0, tardes: 0, noches: 0, turnos12: 0, libres: 0, otros: 0 };

  for (let month = 0; month < 12; month += 1) {
    let horas = 0;
    for (const fecha of monthDates(year, month)) {
      const diaBase = dias[fecha];
      const dia = resolverDiaConIncidencia(state, profesional, diaBase, fecha);
      if (!dia) continue;
      totalBasePrevisto += Number(dia.horasBase || 0);
      horasVacaciones += Number(dia.horasVacaciones || 0);
      horasLibreDisposicion += Number(dia.horasLibreDisposicion || 0);
      horas += Number(dia.horasEfectivas ?? dia.horas ?? 0);
      if (diaBase?.esNoche) noches += 1;
      if (diaBase?.codigo) contarDesglose(diaBase, desglose);
    }
    horasMes.push(roundHours(horas));
    total += horas;
  }

  const jornada = calcularJornadaObjetivo({
    modalidad: profesional.modalidad,
    porcentajeJornada: profesional.porcentajeJornada,
    noches,
    jornadaPersonalizada: state.config.jornadaPersonalizada,
    jornadaManual: profesional.jornadaManual,
  });
  const diferencia = roundHours(total - jornada.objetivo);
  const saldosAusencias = calcularSaldosAusencias(profesional, horasVacaciones, horasLibreDisposicion, state.config);

  return {
    profesionalId: profesional.id,
    horasMes,
    total: roundHours(total),
    totalBasePrevisto: roundHours(totalBasePrevisto),
    horasVacaciones: roundHours(horasVacaciones),
    horasLibreDisposicion: roundHours(horasLibreDisposicion),
    noches,
    jornada,
    diferencia,
    estado: diferencia === 0 ? "ajustado" : diferencia > 0 ? "exceso" : "deficit",
    prorrataPendiente: requiereAdvertenciaProrrata(profesional, year),
    desglose,
    saldosAusencias,
  };
}

function calcularResumenGlobal(state, calendario) {
  return obtenerProfesionalesOrdenados(state.profesionales).map((profesional) => calcularResumenProfesional(profesional, calendario, state));
}

function contarDesglose(dia, desglose) {
  if (dia.grupoCobertura === "manana") desglose.mananas += 1;
  else if (dia.grupoCobertura === "tarde") desglose.tardes += 1;
  else if (dia.grupoCobertura === "noche") desglose.noches += 1;
  else if (dia.grupoCobertura === "libre") desglose.libres += 1;
  else desglose.otros += 1;
  if (Number(dia.horas) >= 12) desglose.turnos12 += 1;
}

function migrarEstado(state) {
  if (!state || typeof state !== "object") return state;
  state.schemaVersion = Math.max(Number(state.schemaVersion || 1), 2);
  state.config ??= {};
  if (typeof state.config.mostrarLibresResumen !== "boolean") state.config.mostrarLibresResumen = true;
  if (typeof state.config.ultimaExportacionJson !== "string") state.config.ultimaExportacionJson = "";
  state.config.ausencias = { ...crearConfiguracionAusenciasBase(), ...(state.config.ausencias || {}) };
  if (!Array.isArray(state.incidenciasDiarias)) state.incidenciasDiarias = [];
  migrarProfesionales(state.profesionales || []);
  migrarTurnos(state.turnos || []);
  migrarIncidencias(state.incidenciasDiarias);
  return state;
}

function migrarProfesionales(profesionales) {
  profesionales.forEach((profesional, index) => {
    profesional.fechaInicio = normalizarFechaIso(profesional.fechaInicio) || profesional.fechaInicio;
    profesional.fechaFin = normalizarFechaIso(profesional.fechaFin) || profesional.fechaFin;
    profesional.fechaInicioCiclo = normalizarFechaIso(profesional.fechaInicioCiclo) || profesional.fechaInicioCiclo;
    profesional.posicionInicial = 0;
    if (!Number.isFinite(Number(profesional.ordenVisual))) profesional.ordenVisual = index + 1;
    if (typeof profesional.activo !== "boolean") profesional.activo = true;
  });
  return profesionales;
}

function migrarTurnos(turnos) {
  turnos.forEach((turno, index) => {
    if (!Number.isFinite(Number(turno.ordenVisual))) turno.ordenVisual = index + 1;
    if (typeof turno.cuentaComoPresencia !== "boolean") turno.cuentaComoPresencia = Number(turno.horasComputables || 0) > 0;
    if (String(turno.codigo || "").toUpperCase() === "L") turno.cuentaComoPresencia = false;
  });
  return turnos;
}

function migrarIncidencias(incidencias) {
  incidencias.forEach((incidencia) => {
    incidencia.fecha = normalizarFechaIso(incidencia.fecha) || incidencia.fecha;
    incidencia.escenarioId ||= ESCENARIO_OFICIAL;
    incidencia.horasTurnoBase = Number(incidencia.horasTurnoBase || 0);
    incidencia.creadoEn ||= incidencia.actualizadoEn || new Date().toISOString();
    incidencia.actualizadoEn ||= incidencia.creadoEn;
  });
  return incidencias;
}

function normalizarEstado(state) {
  migrarEstado(state);
  normalizarOrdenProfesionales(state.profesionales || []);
  return state;
}

function calcularResumenDiarioTurnos(state, calendario, fechas, mostrarLibres = true) {
  const turnos = obtenerTurnosRelevantes(state, calendario, fechas, mostrarLibres);
  const filasTurnos = turnos.map((turno) => ({
    turno,
    codigo: turno.codigo,
    nombre: turno.nombre,
    color: turno.color,
    cuentaComoPresencia: turno.cuentaComoPresencia,
    conteos: Object.fromEntries(fechas.map((fecha) => [fecha, 0])),
  }));
  const filasIncidencias = Object.values(TIPOS_INCIDENCIA)
    .filter((tipo) => mostrarLibres || false)
    .map((tipo) => ({
      turno: null,
      codigo: tipo.codigo,
      nombre: tipo.nombre,
      color: tipo.color,
      cuentaComoPresencia: false,
      conteos: Object.fromEntries(fechas.map((fecha) => [fecha, 0])),
    }));
  const filas = [...filasTurnos, ...filasIncidencias];
  const filaPorCodigo = new Map(filas.map((fila) => [String(fila.codigo).toUpperCase(), fila]));
  const totalPresencia = Object.fromEntries(fechas.map((fecha) => [fecha, 0]));
  const totalActivos = Object.fromEntries(fechas.map((fecha) => [fecha, 0]));

  for (const fecha of fechas) {
    for (const profesional of state.profesionales || []) {
      if (!profesional.activo || !isWithinRange(fecha, profesional.fechaInicio, profesional.fechaFin)) continue;
      totalActivos[fecha] += 1;
      const diaBase = calendario[profesional.id]?.[fecha];
      const dia = resolverDiaConIncidencia(state, profesional, diaBase, fecha);
      if (!dia?.codigoBase) continue;
      const codigoResumen = dia.incidencia ? dia.codigoVisible : dia.codigoBase;
      const turno = dia.incidencia ? null : buscarTurnoPorCodigo(state.turnos, dia.codigoBase);
      const fila = filaPorCodigo.get(String(codigoResumen).toUpperCase());
      if (fila) fila.conteos[fecha] += 1;
      if (!dia.incidencia && turno?.cuentaComoPresencia) totalPresencia[fecha] += 1;
    }
  }

  return { filas, totalPresencia, totalActivos };
}

function obtenerTurnosRelevantes(state, calendario, fechas, mostrarLibres = true) {
  const codigosUsados = new Set();
  for (const profesional of state.profesionales || []) {
    for (const fecha of fechas) {
      const codigo = calendario[profesional.id]?.[fecha]?.codigo;
      const incidencia = state.incidenciasDiarias?.find((item) => item.profesionalId === profesional.id && item.fecha === fecha);
      if (codigo && !incidencia) codigosUsados.add(String(codigo).toUpperCase());
    }
  }
  return obtenerTurnosOrdenados(state.turnos || []).filter((turno) => {
    const usado = codigosUsados.has(String(turno.codigo).toUpperCase());
    const relevante = turno.activo || usado;
    if (!relevante) return false;
    return mostrarLibres || turno.cuentaComoPresencia;
  });
}

const DB_NAME = "gestor_turnos_enfermeria";
const DB_VERSION = 1;
const STORE = "appState";
const STATE_KEY = "current";

function openDb() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = () => {
      const db = request.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function loadState() {
  const db = await openDb();
  return tx(db, "readonly", (store) => store.get(STATE_KEY));
}

async function saveState(state) {
  const db = await openDb();
  const payload = structuredClone(state);
  payload.updatedAt = new Date().toISOString();
  return tx(db, "readwrite", (store) => store.put(payload, STATE_KEY));
}

async function exportDatabaseSnapshot(stateFallback = null) {
  const db = await openDb();
  const stores = {};
  for (const storeName of Array.from(db.objectStoreNames)) {
    stores[storeName] = await readStore(db, storeName);
  }
  if (stateFallback && !stores[STORE]?.some((entry) => entry.key === STATE_KEY)) {
    stores[STORE] = [{ key: STATE_KEY, value: structuredClone(stateFallback) }];
  }
  return {
    databaseName: DB_NAME,
    databaseVersion: DB_VERSION,
    exportedStores: Object.keys(stores),
    stores,
  };
}

async function clearState() {
  const db = await openDb();
  return tx(db, "readwrite", (store) => store.delete(STATE_KEY));
}

function tx(db, mode, operation) {
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(STORE, mode);
    const store = transaction.objectStore(STORE);
    const request = operation(store);
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
    transaction.onerror = () => reject(transaction.error);
  });
}

function requestToPromise(request) {
  return new Promise((resolve, reject) => {
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function readStore(db, storeName) {
  const transaction = db.transaction(storeName, "readonly");
  const store = transaction.objectStore(storeName);
  const [keys, values] = await Promise.all([
    requestToPromise(store.getAllKeys()),
    requestToPromise(store.getAll()),
  ]);
  return keys.map((key, index) => ({ key, value: values[index] }));
}

const BACKUP_APPLICATION_NAME = "Gestor Local de Turnos de Enfermería";
const BACKUP_LEGACY_APP_ID = "gestor-turnos-enfermeria";
const BACKUP_SCHEMA_VERSION = 1;
const APP_VERSION = "0.1";

function crearBackup(state, databaseSnapshot = null, exportedAt = new Date().toISOString()) {
  const data = migrarEstado(structuredClone(state));
  const indexedDb = databaseSnapshot || crearSnapshotDesdeEstado(data);
  return {
    application: BACKUP_APPLICATION_NAME,
    app: BACKUP_LEGACY_APP_ID,
    schemaVersion: BACKUP_SCHEMA_VERSION,
    appVersion: APP_VERSION,
    exportedAt,
    data,
    indexedDb,
    perfilNormativo: structuredClone(PERFIL_NORMATIVO_SESCAM_2019),
  };
}

function crearSnapshotDesdeEstado(state) {
  return {
    databaseName: "gestor_turnos_enfermeria",
    databaseVersion: 1,
    exportedStores: ["appState"],
    stores: {
      appState: [{ key: "current", value: structuredClone(state) }],
    },
  };
}

function crearNombreCopia(prefijo = "gestor-turnos_copia", date = new Date()) {
  const pad = (value) => String(value).padStart(2, "0");
  const yyyy = date.getFullYear();
  const mm = pad(date.getMonth() + 1);
  const dd = pad(date.getDate());
  const hh = pad(date.getHours());
  const min = pad(date.getMinutes());
  return `${prefijo}_${yyyy}-${mm}-${dd}_${hh}${min}.json`;
}

function validarBackup(payload) {
  const errores = [];
  if (!payload || typeof payload !== "object" || Array.isArray(payload)) return ["El archivo no contiene una copia JSON valida."];

  if (!("schemaVersion" in payload)) errores.push("Falta schemaVersion en la copia.");
  else if (Number(payload.schemaVersion) !== BACKUP_SCHEMA_VERSION) errores.push(`Version de esquema incompatible. Esperada: ${BACKUP_SCHEMA_VERSION}. Encontrada: ${payload.schemaVersion}.`);

  const application = payload.application || payload.app;
  if (application !== BACKUP_APPLICATION_NAME && application !== BACKUP_LEGACY_APP_ID) errores.push("La copia no corresponde a esta aplicacion.");
  if (!payload.exportedAt || Number.isNaN(Date.parse(payload.exportedAt))) errores.push("La fecha de exportacion no es valida.");
  if (!payload.data || typeof payload.data !== "object" || Array.isArray(payload.data)) errores.push("La estructura de datos esta incompleta.");
  if (errores.length) return errores;

  validarEstado(payload.data, errores);
  validarNormativa(payload.perfilNormativo, errores);
  validarSnapshotIndexedDb(payload, errores);
  return errores;
}

function prepararImportacionBackup(payload) {
  const errores = validarBackup(payload);
  if (errores.length) return { errores, data: null, resumen: null };
  const data = migrarEstado(structuredClone(payload.data));
  return { errores: [], data, resumen: resumirBackup({ ...payload, data }) };
}

function resumirBackup(payload) {
  const data = payload?.data || {};
  const config = data.config || {};
  const unidad = config.unidad || config.hospital || "No indicada";
  const anios = new Set();
  if (config.anioActivo) anios.add(String(config.anioActivo));
  for (const profesional of data.profesionales || []) {
    if (profesional.fechaInicio) anios.add(String(profesional.fechaInicio).slice(0, 4));
    if (profesional.fechaFin) anios.add(String(profesional.fechaFin).slice(0, 4));
  }
  return {
    exportedAt: payload.exportedAt,
    schemaVersion: payload.schemaVersion,
    appVersion: payload.appVersion || "desconocida",
    unidades: unidad ? 1 : 0,
    unidadPrincipal: unidad,
    profesionales: data.profesionales?.length || 0,
    turnos: data.turnos?.length || 0,
    ciclos: data.ciclos?.length || 0,
    anios: [...anios].filter(Boolean).sort(),
  };
}

function formatearResumenImportacion(resumen) {
  const fecha = resumen.exportedAt ? new Date(resumen.exportedAt).toLocaleString("es-ES") : "No indicada";
  return [
    `Copia creada: ${fecha}`,
    `Version del esquema: ${resumen.schemaVersion}`,
    `Version de la aplicacion: ${resumen.appVersion}`,
    `Unidades: ${resumen.unidades}`,
    `Unidad: ${resumen.unidadPrincipal}`,
    `Profesionales: ${resumen.profesionales}`,
    `Turnos: ${resumen.turnos}`,
    `Ciclos: ${resumen.ciclos}`,
    `Año activo: ${resumen.anios.join(", ") || "No indicado"}`,
    "",
    "La importacion sustituira los datos almacenados actualmente en este navegador.",
  ].join("\n");
}

async function sustituirEstadoConRollback({ estadoActual, estadoNuevo, guardarEstado }) {
  try {
    await guardarEstado(estadoNuevo);
    return estadoNuevo;
  } catch (error) {
    try {
      await guardarEstado(estadoActual);
    } catch {
      // La escritura original fallo antes de confirmar el nuevo estado; se mantiene el error principal.
    }
    throw new Error(`No se pudo importar la copia. Se mantienen los datos anteriores. ${error.message}`);
  }
}

function descargarJson(nombre, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = nombre;
  link.click();
  URL.revokeObjectURL(url);
}

function validarEstado(data, errores) {
  if (!data.config || typeof data.config !== "object") errores.push("Falta la configuracion general.");
  if (!Array.isArray(data.profesionales)) errores.push("La lista de profesionales no es valida.");
  if (!Array.isArray(data.turnos)) errores.push("La lista de turnos no es valida.");
  if (!Array.isArray(data.ciclos)) errores.push("La lista de ciclos no es valida.");
  if (data.incidenciasDiarias && !Array.isArray(data.incidenciasDiarias)) errores.push("La lista de incidencias diarias no es valida.");
  if (errores.length) return;

  if (!Number.isFinite(Number(data.config.anioActivo))) errores.push("El ano activo no es valido.");
  validarDuplicados(data.profesionales, "profesionales", errores);
  validarDuplicados(data.turnos, "turnos", errores);
  validarDuplicados(data.ciclos, "ciclos", errores);

  const codigosTurno = new Set();
  for (const turno of data.turnos) {
    if (!turno.id) errores.push("Hay un turno sin identificador.");
    if (!turno.codigo) errores.push("Hay un turno sin codigo.");
    const codigo = String(turno.codigo || "").toUpperCase();
    if (codigosTurno.has(codigo)) errores.push(`Codigo de turno duplicado: ${codigo}.`);
    codigosTurno.add(codigo);
    if (!/^#[0-9a-f]{6}$/i.test(String(turno.color || ""))) errores.push(`Color no valido en turno ${codigo || turno.id}.`);
    if (!Number.isFinite(Number(turno.horasComputables)) || Number(turno.horasComputables) < 0) errores.push(`Horas no validas en turno ${codigo || turno.id}.`);
    if ("cuentaComoPresencia" in turno && typeof turno.cuentaComoPresencia !== "boolean") errores.push(`El turno ${codigo || turno.id} no define correctamente cuentaComoPresencia.`);
  }

  const ciclos = new Set(data.ciclos.map((ciclo) => ciclo.id));
  const profesionales = new Set(data.profesionales.map((profesional) => profesional.id));
  for (const ciclo of data.ciclos) {
    if (!ciclo.id) errores.push("Hay un ciclo sin identificador.");
    if (!Array.isArray(ciclo.codigos) || !ciclo.codigos.length) errores.push(`El ciclo ${ciclo.nombre || ciclo.id} no tiene secuencia.`);
    for (const codigo of ciclo.codigos || []) {
      if (!codigosTurno.has(String(codigo).toUpperCase())) errores.push(`El ciclo ${ciclo.nombre || ciclo.id} referencia el turno inexistente ${codigo}.`);
    }
  }

  for (const profesional of data.profesionales) {
    if (!profesional.id) errores.push("Hay un profesional sin identificador.");
    if (!profesional.nombre && !profesional.identificador) errores.push(`El profesional ${profesional.id || "sin id"} no tiene nombre ni identificador.`);
    if (profesional.cicloId && !ciclos.has(profesional.cicloId)) errores.push(`El profesional ${profesional.nombre || profesional.id} referencia un ciclo inexistente.`);
    validarFecha(profesional.fechaInicio, `Fecha de inicio no valida en ${profesional.nombre || profesional.id}.`, errores);
    validarFecha(profesional.fechaFin, `Fecha de fin no valida en ${profesional.nombre || profesional.id}.`, errores);
    validarFecha(profesional.fechaInicioCiclo, `Fecha de inicio de ciclo no valida en ${profesional.nombre || profesional.id}.`, errores);
    if (profesional.fechaInicio && profesional.fechaFin && profesional.fechaFin < profesional.fechaInicio) errores.push(`Contrato con fechas invertidas en ${profesional.nombre || profesional.id}.`);
    if ("ordenVisual" in profesional && !Number.isFinite(Number(profesional.ordenVisual))) errores.push(`Orden visual no valido en ${profesional.nombre || profesional.id}.`);
  }

  const clavesIncidencia = new Set();
  for (const incidencia of data.incidenciasDiarias || []) {
    if (!incidencia.id) errores.push("Hay una incidencia sin identificador.");
    if (!profesionales.has(incidencia.profesionalId)) errores.push(`Incidencia con profesional inexistente: ${incidencia.profesionalId}.`);
    validarFecha(incidencia.fecha, `Fecha no valida en incidencia ${incidencia.id || ""}.`, errores);
    if (!["V", "LD"].includes(incidencia.tipoIncidencia)) errores.push(`Tipo de incidencia no valido: ${incidencia.tipoIncidencia}.`);
    if (!incidencia.codigoTurnoBase) errores.push(`Incidencia sin codigo de turno base: ${incidencia.id || ""}.`);
    if (!Number.isFinite(Number(incidencia.horasTurnoBase)) || Number(incidencia.horasTurnoBase) < 0) errores.push(`Horas de turno base no validas en incidencia ${incidencia.id || ""}.`);
    const clave = `${incidencia.profesionalId}|${incidencia.fecha}|${incidencia.escenarioId || "escenario-oficial"}`;
    if (clavesIncidencia.has(clave)) errores.push(`Incidencia duplicada para profesional, fecha y escenario: ${clave}.`);
    clavesIncidencia.add(clave);
  }
}

function validarDuplicados(items, nombre, errores) {
  const ids = new Set();
  for (const item of items) {
    if (!item.id) continue;
    if (ids.has(item.id)) errores.push(`Identificador duplicado en ${nombre}: ${item.id}.`);
    ids.add(item.id);
  }
}

function validarFecha(value, message, errores) {
  if (!value) return;
  if (!normalizarFechaIso(value)) errores.push(message);
}

function validarNormativa(perfil, errores) {
  if (!perfil || typeof perfil !== "object") {
    errores.push("La copia no incluye el perfil normativo.");
    return;
  }
  if (!Array.isArray(perfil.tablaPonderacion) || perfil.tablaPonderacion.length < 146) errores.push("La tabla normativa de ponderacion esta incompleta.");
  const noches = new Set((perfil.tablaPonderacion || []).map((fila) => Number(fila.numero_noches)));
  if (!noches.has(0) || !noches.has(145)) errores.push("La tabla normativa debe cubrir de 0 a 145 noches.");
}

function validarSnapshotIndexedDb(payload, errores) {
  const snapshot = payload.indexedDb;
  if (!snapshot || typeof snapshot !== "object") {
    if (payload.app === BACKUP_LEGACY_APP_ID && !payload.application) return;
    errores.push("La copia no incluye la instantanea de IndexedDB.");
    return;
  }
  if (!snapshot.stores || typeof snapshot.stores !== "object") errores.push("La instantanea de IndexedDB no contiene almacenes.");
  if (!snapshot.stores?.appState?.some((entry) => entry.key === "current")) errores.push("La instantanea no incluye el almacen appState/current.");
}

function tablaCuadrante(state, calendario, selectedMonth) {
  const year = Number(state.config.anioActivo);
  const fechas = monthDates(year, selectedMonth);
  const today = new Date().toISOString().slice(0, 10);
  const header = fechas.map((fecha) => {
    const d = parseDate(fecha).getUTCDate();
    const wd = weekdayIndex(fecha);
    return `<th class="day-head ${wd === 0 || wd === 6 ? "weekend" : ""} ${fecha === today ? "today" : ""}">${d}<br><span class="muted">${DIAS[wd]}</span></th>`;
  }).join("");
  const rows = obtenerProfesionalesOrdenados(state.profesionales).map((p) => {
    let total = 0;
    const cells = fechas.map((fecha) => {
      const diaBase = calendario[p.id]?.[fecha] || {};
      const dia = resolverDiaConIncidencia(state, p, diaBase, fecha);
      total += Number((dia.horasEfectivas ?? dia.horas) || 0);
      const turno = state.turnos.find((t) => t.codigo === dia.codigoBase || t.codigo === dia.codigo);
      const wd = weekdayIndex(fecha);
      const editable = diaBase.codigo && !diaBase.fueraContrato && !diaBase.sinCiclo;
      const title = dia.incidencia
        ? `${TIPOS_INCIDENCIA[dia.incidencia.tipoIncidencia].nombre}\nTurno previsto: ${dia.codigoBase}\nHoras descontadas: ${dia.horasVacaciones || dia.horasLibreDisposicion}`
        : (turno ? `${turno.nombre} · ${turno.inicio || ""}-${turno.fin || ""} · ${turno.horasComputables} h` : "Fuera de contrato o sin ciclo");
      return `<td class="shift-cell ${dia.incidencia ? "incidence-cell" : ""} ${wd === 0 || wd === 6 ? "weekend" : ""} ${fecha === today ? "today" : ""}" ${editable ? `data-action="edit-incidencia" data-id="${p.id}" data-fecha="${fecha}"` : ""} style="background:${dia.colorIncidencia || turno?.color || "#fff"}" title="${escapeAttr(title)}">${escapeHtml(dia.codigoVisible || dia.codigo || "")}</td>`;
    }).join("");
    return `<tr><td>${escapeHtml(p.nombre || p.identificador)}</td>${cells}<td><strong>${fmt(total)}</strong></td></tr>`;
  }).join("");
  const resumen = calcularResumenDiarioTurnos(state, calendario, fechas, state.config.mostrarLibresResumen !== false);
  const resumenRows = resumen.filas.map((fila) => `<tr class="summary-row"><td><span class="shift-code" style="background:${fila.color};">${escapeHtml(fila.codigo)}</span> ${escapeHtml(fila.nombre || "")}</td>${fechas.map((fecha) => `<td class="summary-count">${fila.conteos[fecha]}</td>`).join("")}<td></td></tr>`).join("");
  const totalPresencia = `<tr class="summary-total"><td>Total de profesionales programados</td>${fechas.map((fecha) => `<td class="summary-count">${resumen.totalPresencia[fecha]}</td>`).join("")}<td></td></tr>`;
  const totalActivos = `<tr class="summary-total active-total"><td>Total de profesionales activos</td>${fechas.map((fecha) => `<td class="summary-count">${resumen.totalActivos[fecha]}</td>`).join("")}<td></td></tr>`;
  const summaryTitle = `<tr class="summary-title"><td colspan="${fechas.length + 2}">Resumen diario de turnos</td></tr>`;
  return `<table class="calendar"><thead><tr><th>Profesional</th>${header}<th>Total</th></tr></thead><tbody>${rows || emptyRow(fechas.length + 2)}${summaryTitle}${resumenRows}${totalPresencia}${totalActivos}</tbody></table>`;
}

        <li>Guarde los archivos JSON en una ubicacion segura.</li>
      </ul>
      <div class="actions"><button class="danger" data-action="reset-data">Restablecer datos</button></div>
    </div>
  `;
}

function metric(label, value, detail = "") {
  return `<div class="card metric"><div class="label">${label}</div><div class="value">${value}</div>${detail ? `<div class="metric-detail">${detail}</div>` : ""}</div>`;
}

function estadoBadge(estado) {
  if (!estado) return "";
  const cls = estado === "ajustado" ? "ok" : estado === "exceso" ? "warn" : "danger";
  return `<span class="badge ${cls}">${estado}</span>`;
}

function emptyRow(cols) {
  return `<tr><td colspan="${cols}" class="muted">Sin datos todavía.</td></tr>`;
}

function options(items) {
  return items.map(([value, label]) => `<option value="${escapeAttr(value)}">${escapeHtml(label)}</option>`).join("");
}

function fmt(value) {
  return Number(value || 0).toLocaleString("es-ES", { maximumFractionDigits: 2 });
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[ch]);
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, "&#096;");
}
