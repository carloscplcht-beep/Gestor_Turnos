<html lang="es">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestor local de turnos de enfermeria</title>
    <style>
:root {
  --bg: #f4f8fb;
  --surface: #ffffff;
  --surface-2: #eef6fb;
  --text: #17324d;
  --muted: #64748b;
  --line: #d8e4ec;
  --primary: #0b6f9c;
  --primary-dark: #07587d;
  --teal: #0f9f8f;
  --danger: #b42318;
  --warn: #b4690e;
  --ok: #13795b;
  --radius: 8px;
  --shadow: 0 10px 28px rgba(15, 76, 117, 0.09);
}

* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 14px;
  overflow-x: hidden;
}

button, input, select, textarea { font: inherit; }
button {
  border: 0;
  border-radius: 7px;
  padding: 9px 12px;
  background: var(--primary);
  color: #fff;
  cursor: pointer;
  font-weight: 650;
}
button.secondary { background: #e5eef5; color: var(--text); }
button.danger { background: var(--danger); }
button.ghost { background: transparent; color: var(--primary); padding: 6px 8px; }
button:disabled { opacity: .55; cursor: not-allowed; }

.app-shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 248px 1fr;
}
.sidebar {
  background: #0b4263;
  color: #e9f7ff;
  padding: 20px 16px;
  position: sticky;
  top: 0;
  height: 100vh;
  min-width: 0;
}
.brand { font-size: 19px; line-height: 1.15; font-weight: 750; margin-bottom: 24px; overflow-wrap: anywhere; }
.nav-button {
  width: 100%;
  text-align: left;
  background: transparent;
  color: #e9f7ff;
  margin: 2px 0;
  border-radius: 7px;
}
.nav-button.active { background: rgba(255,255,255,.14); }
.status-pill {
  margin-top: 26px;
  padding: 10px;
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 8px;
  color: #cdeefa;
  font-size: 12px;
}
.main { min-width: 0; }
.topbar {
  background: rgba(255,255,255,.88);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--line);
  padding: 16px 22px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar h1 { margin: 0; font-size: 22px; letter-spacing: 0; overflow-wrap: anywhere; }
.topbar-meta { color: var(--muted); margin-top: 4px; display: flex; gap: 14px; flex-wrap: wrap; }
.content { padding: 20px 22px 34px; }
.section { display: none; }
.section.active { display: block; }
.grid { display: grid; gap: 14px; }
.grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
}
.card h2, .card h3 { margin: 0 0 12px; }
.metric { min-height: 102px; }
.metric .value { font-size: 30px; font-weight: 760; margin-top: 8px; }
.metric .label { color: var(--muted); }
.form-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(160px, 1fr));
  gap: 12px;
}
label { display: grid; gap: 5px; color: var(--muted); font-size: 12px; font-weight: 650; }
input, select, textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: #fff;
  color: var(--text);
  padding: 9px 10px;
}
.actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 12px; }
.table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
}
table { border-collapse: separate; border-spacing: 0; width: 100%; }
th, td { padding: 8px 9px; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line); text-align: left; white-space: nowrap; }
th { background: var(--surface-2); font-size: 12px; color: #36566f; position: sticky; top: 0; z-index: 2; }
td:last-child, th:last-child { border-right: 0; }
tr:last-child td { border-bottom: 0; }
.calendar th:first-child, .calendar td:first-child {
  position: sticky;
  left: 0;
  z-index: 3;
  background: #fff;
  min-width: 210px;
}
.calendar th:first-child { background: var(--surface-2); z-index: 4; }
.day-head { text-align: center; min-width: 42px; }
.weekend { background: #f3f6f8; }
.today { outline: 2px solid var(--teal); outline-offset: -2px; }
.shift-cell { text-align: center; font-weight: 750; color: #143047; }
.muted { color: var(--muted); }
.badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 3px 8px; font-size: 12px; font-weight: 700; }
.badge.ok { background: #e7f6ef; color: var(--ok); }
.badge.warn { background: #fff4df; color: var(--warn); }
.badge.danger { background: #ffe8e5; color: var(--danger); }
.sequence { display: flex; gap: 6px; flex-wrap: wrap; }
.sequence span { padding: 5px 9px; border-radius: 6px; background: #eaf4fa; font-weight: 750; }
.notice { border-left: 4px solid var(--teal); background: #edfafa; padding: 11px 12px; border-radius: 6px; color: #165d57; }
.notice-warn { border-left-color: var(--warn); background: #fff4df; color: #74420a; margin-bottom: 14px; }
.file-input { padding: 7px; background: #fff; }

@media (max-width: 980px) {
  .app-shell { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .grid.cols-3, .grid.cols-4, .grid.cols-2 { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 620px) {
  .form-grid { grid-template-columns: 1fr; }
  .content { padding: 14px; }
  .topbar h1, .topbar-meta { max-width: calc(100vw - 44px); }
  .topbar h1 { font-size: 20px; line-height: 1.2; }
}

    </style>

// ---- src/js/utils/dateUtils.js ----
const DAY_MS = 24 * 60 * 60 * 1000;

function parseDate(value) {
  if (!value) return null;
  const [year, month, day] = String(value).split("-").map(Number);
  return new Date(Date.UTC(year, month - 1, day));
}

function formatDate(date) {
  return date.toISOString().slice(0, 10);
}

function daysBetween(startDate, endDate) {
  const start = parseDate(startDate);
  const end = parseDate(endDate);
  return Math.round((end.getTime() - start.getTime()) / DAY_MS);
}

function daysInMonth(year, monthIndex) {
  return new Date(Date.UTC(year, monthIndex + 1, 0)).getUTCDate();
}

function monthDates(year, monthIndex) {
  const total = daysInMonth(year, monthIndex);
  return Array.from({ length: total }, (_, index) => formatDate(new Date(Date.UTC(year, monthIndex, index + 1))));
}

function weekdayIndex(dateString) {
  return parseDate(dateString).getUTCDay();
}

function isWithinRange(dateString, startDate, endDate) {
  if (startDate && daysBetween(startDate, dateString) < 0) return false;
  if (endDate && daysBetween(dateString, endDate) < 0) return false;
  return true;
}

const GRUPOS_COBERTURA = ["manana", "tarde", "noche", "diurno12", "nocturno12", "libre", "otro"];

function crearTurnosIniciales() {
  return [
    turno("M", "Manana", "08:00", "15:00", 7, "manana", "#f8d66d", false),
    turno("T", "Tarde", "15:00", "22:00", 7, "tarde", "#f5a85b", false),
    turno("N", "Noche", "22:00", "08:00", 10, "noche", "#6fa8dc", true),
    turno("D12", "Diurno 12 h", "08:00", "20:00", 12, "diurno12", "#b7d7f4", false),
    turno("N12", "Nocturno 12 h", "20:00", "08:00", 12, "noche", "#4b8ccc", true),
    turno("L", "Libre", "", "", 0, "libre", "#b7dfae", false),
  ];
}

function turno(codigo, nombre, inicio, fin, horasComputables, grupoCobertura, color, cruzaMedianoche) {
  return {
    id: crypto.randomUUID(),
    codigo,
    nombre,
    inicio,
    fin,
    horasComputables: Number(horasComputables),
    grupoCobertura,
    color,
    cruzaMedianoche: Boolean(cruzaMedianoche),
    activo: true,
  };
}

function validarTurno(turnoActual, turnos) {
  const errores = [];
  if (!turnoActual.codigo || turnoActual.codigo.length > 6) errores.push("El codigo es obligatorio y debe ser corto.");
  if (!turnoActual.nombre) errores.push("El nombre del turno es obligatorio.");
  if (Number(turnoActual.horasComputables) < 0) errores.push("Las horas computables no pueden ser negativas.");
  if (!/^#[0-9a-f]{6}$/i.test(turnoActual.color)) errores.push("El color debe ser hexadecimal.");
  const duplicado = turnos.some((item) => item.codigo.toUpperCase() === turnoActual.codigo.toUpperCase() && item.id !== turnoActual.id);
  if (duplicado) errores.push("Ya existe un turno con ese codigo.");
  return errores;
}

function buscarTurnoPorCodigo(turnos, codigo) {
  return turnos.find((turnoItem) => turnoItem.codigo.toUpperCase() === String(codigo).toUpperCase()) || null;
}


// ---- src/js/domain/ciclos.js ----

function moduloPositivo(n, m) {
  if (!m) throw new Error("La longitud del ciclo debe ser mayor que cero.");
  return ((n % m) + m) % m;
}

function parsearSecuencia(texto) {
  return String(texto)
    .split(/[\s,;·|\-]+/u)
    .map((item) => item.trim())
    .filter(Boolean);
}

function validarSecuencia(codigos, turnos) {
  const errores = [];
  if (!codigos.length) errores.push("El ciclo necesita al menos una posicion.");
  const noEncontrados = codigos.filter((codigo) => !buscarTurnoPorCodigo(turnos, codigo));
  if (noEncontrados.length) errores.push(`Turnos no encontrados: ${[...new Set(noEncontrados)].join(", ")}`);
  return errores;
}

function crearCiclo(nombre, codigos, turnos) {
  const errores = validarSecuencia(codigos, turnos);
  if (errores.length) throw new Error(errores.join(" "));
  return {
    id: crypto.randomUUID(),
    nombre,
    codigos,
    activo: true,
    archivado: false,
  };
}

function turnoParaFecha(ciclo, fechaConsultada, fechaInicioCiclo, posicionInicial, daysBetweenFn) {
  if (!ciclo || !ciclo.codigos?.length || !fechaInicioCiclo) return null;
  const diasTranscurridos = daysBetweenFn(fechaInicioCiclo, fechaConsultada);
  const indice = moduloPositivo(diasTranscurridos + Number(posicionInicial || 0), ciclo.codigos.length);
  return ciclo.codigos[indice];
}

function resumenCiclo(ciclo, turnos) {
  const resumen = {
    longitud: ciclo?.codigos?.length || 0,
    horasTotales: 0,
    mananas: 0,
    tardes: 0,
    noches: 0,
    turnos12: 0,
    libres: 0,
    otros: 0,
    promedioSemanal: 0,
  };
  for (const codigo of ciclo?.codigos || []) {
    const turno = buscarTurnoPorCodigo(turnos, codigo);
    if (!turno) continue;
    resumen.horasTotales += Number(turno.horasComputables || 0);
    if (turno.grupoCobertura === "manana") resumen.mananas += 1;
    else if (turno.grupoCobertura === "tarde") resumen.tardes += 1;
    else if (turno.grupoCobertura === "noche") resumen.noches += 1;
    else if (turno.grupoCobertura === "libre") resumen.libres += 1;
    else resumen.otros += 1;
    if (Number(turno.horasComputables) >= 12) resumen.turnos12 += 1;
  }
  resumen.promedioSemanal = resumen.longitud ? (resumen.horasTotales / resumen.longitud) * 7 : 0;
  return resumen;
}

const MODALIDADES = [
  { id: "diurno", nombre: "Diurno", tipo: "fijo", key: "turnoDiurno" },
  { id: "nocturno", nombre: "Nocturno", tipo: "fijo", key: "turnoNocturno" },
  { id: "rotatorio", nombre: "Rotatorio", tipo: "tabla" },
  { id: "atencionContinuadaAP", nombre: "Atencion continuada AP", tipo: "fijo", key: "atencionContinuadaAtencionPrimaria" },
  { id: "emergencias", nombre: "Emergencias / centro coordinador", tipo: "fijo", key: "unidadMovilEmergenciasCentroCoordinador" },
  { id: "suap", nombre: "SUAP", tipo: "fijo", key: "suap" },
  { id: "personalizado", nombre: "Personalizada", tipo: "manual" },
];

function obtenerFilaPonderacion(numeroNoches) {
  return PERFIL_NORMATIVO_SESCAM_2019.tablaPonderacion.find((fila) => fila.numero_noches === Number(numeroNoches)) || null;
}

function calcularJornadaObjetivo({ modalidad, porcentajeJornada = 100, noches = 0, jornadaPersonalizada = 0, jornadaManual = null }) {
  const porcentaje = Number(porcentajeJornada || 100) / 100;
  const modalidadInfo = MODALIDADES.find((item) => item.id === modalidad) || MODALIDADES[0];
  let base = 0;
  let origen = "valor fijo";
  let filaPonderacion = null;
  let advertencia = "";

  if (modalidadInfo.tipo === "tabla") {
    filaPonderacion = obtenerFilaPonderacion(noches);
    if (!filaPonderacion) {
      advertencia = "Numero de noches fuera de la tabla oficial disponible.";
      base = 0;
    } else {
      base = Number(filaPonderacion.jornada_realizar);
      origen = "tabla de ponderacion";
    }
  } else if (modalidadInfo.tipo === "manual") {
    base = Number(jornadaPersonalizada || 0);
    origen = "valor personalizado";
  } else {
    base = Number(PERFIL_NORMATIVO_SESCAM_2019.jornadasFijas[modalidadInfo.key]);
  }

  const automatica = roundHours(base * porcentaje);
  const objetivo = jornadaManual !== null && jornadaManual !== "" ? Number(jornadaManual) : automatica;

  return {
    modalidad: modalidadInfo,
    base,
    porcentaje,
    automatica,
    objetivo,
    origen,
    filaPonderacion,
    advertencia,
  };
}

function requiereAdvertenciaProrrata(profesional, year) {
  const inicio = `${year}-01-01`;
  const fin = `${year}-12-31`;
  return Boolean((profesional.fechaInicio && profesional.fechaInicio > inicio) || (profesional.fechaFin && profesional.fechaFin < fin));
}

function roundHours(value) {
  return Math.round((Number(value) + Number.EPSILON) * 100) / 100;
}



// ---- src/js/domain/generadorCalendario.js ----



function generarCalendarioAnual(state) {
  const year = Number(state.config.anioActivo);
  const resultado = {};
  for (const profesional of state.profesionales) {
    resultado[profesional.id] = {};
    for (let month = 0; month < 12; month += 1) {
      for (const fecha of monthDates(year, month)) {
        resultado[profesional.id][fecha] = generarDia(profesional, fecha, state);
      }
    }
  }
  return resultado;
}

function generarDia(profesional, fecha, state) {
  if (!profesional.activo || !isWithinRange(fecha, profesional.fechaInicio, profesional.fechaFin)) {
    return { fecha, codigo: "", horas: 0, esNoche: false, fueraContrato: true };
  }
  const ciclo = state.ciclos.find((item) => item.id === profesional.cicloId && item.activo && !item.archivado);
  const codigo = turnoParaFecha(ciclo, fecha, profesional.fechaInicioCiclo, profesional.posicionInicial, daysBetween);
  if (!codigo) return { fecha, codigo: "", horas: 0, esNoche: false, sinCiclo: true };
  const turno = buscarTurnoPorCodigo(state.turnos, codigo);
  if (!turno) return { fecha, codigo, horas: 0, esNoche: false, error: "Turno no encontrado" };
  return {
    fecha,
    codigo: turno.codigo,
    horas: Number(turno.horasComputables || 0),
    esNoche: turno.grupoCobertura === "noche",
    grupoCobertura: turno.grupoCobertura,
    turnoId: turno.id,
  };
}

  const year = Number(state.config.anioActivo);
  const dias = calendario[profesional.id] || {};
  const horasMes = [];
  let total = 0;
  let noches = 0;
  const desglose = { mananas: 0, tardes: 0, noches: 0, turnos12: 0, libres: 0, otros: 0 };

  for (let month = 0; month < 12; month += 1) {
    let horas = 0;
    for (const fecha of monthDates(year, month)) {
      const dia = dias[fecha];
      if (!dia) continue;
      horas += Number(dia.horas || 0);
      if (dia.esNoche) noches += 1;
      if (dia.codigo) contarDesglose(dia, desglose);
    }
    horasMes.push(roundHours(horas));
    total += horas;
  }

  const jornada = calcularJornadaObjetivo({
    modalidad: profesional.modalidad,
    porcentajeJornada: profesional.porcentajeJornada,
    noches,
    jornadaPersonalizada: state.config.jornadaPersonalizada,
    jornadaManual: profesional.jornadaManual,
  });
  const diferencia = roundHours(total - jornada.objetivo);

  return {
    profesionalId: profesional.id,
    horasMes,
    total: roundHours(total),
    noches,
    jornada,
    diferencia,
    estado: diferencia === 0 ? "ajustado" : diferencia > 0 ? "exceso" : "deficit",
    prorrataPendiente: requiereAdvertenciaProrrata(profesional, year),
    desglose,
  };
}

function calcularResumenGlobal(state, calendario) {
  return state.profesionales.map((profesional) => calcularResumenProfesional(profesional, calendario, state));
}

function contarDesglose(dia, desglose) {
  if (dia.grupoCobertura === "manana") desglose.mananas += 1;
  else if (dia.grupoCobertura === "tarde") desglose.tardes += 1;
  else if (dia.grupoCobertura === "noche") desglose.noches += 1;
  else if (dia.grupoCobertura === "libre") desglose.libres += 1;
  else desglose.otros += 1;
  if (Number(dia.horas) >= 12) desglose.turnos12 += 1;
}

// ---- src/js/storage/indexedDb.js ----
const DB_NAME = "gestor_turnos_enfermeria";
const DB_VERSION = 1;
const STORE = "appState";
const STATE_KEY = "current";

function openDb() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = () => {
      const db = request.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function loadState() {
  const db = await openDb();
  return tx(db, "readonly", (store) => store.get(STATE_KEY));
}

async function saveState(state) {
  const db = await openDb();
  const payload = structuredClone(state);
  payload.updatedAt = new Date().toISOString();
  return tx(db, "readwrite", (store) => store.put(payload, STATE_KEY));
}

async function clearState() {
  const db = await openDb();
  return tx(db, "readwrite", (store) => store.delete(STATE_KEY));
}

function tx(db, mode, operation) {
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(STORE, mode);
    const store = transaction.objectStore(STORE);
    const request = operation(store);
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
    transaction.onerror = () => reject(transaction.error);
  });
}

function validarBackup(payload) {
  const errores = [];
  if (!payload || typeof payload !== "object") errores.push("El archivo no contiene JSON valido.");
  if (payload?.schemaVersion !== 1) errores.push("Version de esquema no compatible.");
  if (payload?.app !== "gestor-turnos-enfermeria") errores.push("La copia no corresponde a esta aplicacion.");
  if (!payload?.data?.config || !Array.isArray(payload?.data?.profesionales)) errores.push("La estructura de datos esta incompleta.");
  return errores;
}

function descargarJson(nombre, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = nombre;
  link.click();
  URL.revokeObjectURL(url);
}

function estadoBadge(estado) {

function emptyRow(cols) {

function options(items) {
  return items.map(([value, label]) => `<option value="${escapeAttr(value)}">${escapeHtml(label)}</option>`).join("");
}

function fmt(value) {
  return Number(value || 0).toLocaleString("es-ES", { maximumFractionDigits: 2 });
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[ch]);
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, "&#096;");
}

  recalcAndRender();
}

function recalcAndRender() {
  calendario = generarCalendarioAnual(state);
  resumenes = calcularResumenGlobal(state, calendario);
  renderApp(root, state, calendario, resumenes, activeTab, selectedMonth, runtimeNotice);
  bindEvents();
}

async function persist() {
  try {
    await saveState(state);
    runtimeNotice = "";
  } catch (error) {
    runtimeNotice = `No se pudo guardar en IndexedDB. Los cambios siguen visibles en memoria: ${error.message}`;
    notify(runtimeNotice, true);
  } finally {
    recalcAndRender();
  }
}

function bindEvents() {
  root.querySelectorAll("[data-tab]").forEach((button) => {
    button.addEventListener("click", () => {
      activeTab = button.dataset.tab;
      recalcAndRender();
    });
  });

  root.querySelector("#configForm")?.addEventListener("submit", async (event) => {
    event.preventDefault();
    const data = Object.fromEntries(new FormData(event.currentTarget));
    state.config = { ...state.config, ...data, anioActivo: Number(data.anioActivo), jornadaPersonalizada: Number(data.jornadaPersonalizada) };
    await persist();
  });

  root.querySelector("#profesionalForm")?.addEventListener("submit", async (event) => {
    event.preventDefault();
    const form = event.currentTarget;
    const data = Object.fromEntries(new FormData(form));
    const errores = validarProfesional(data);
    if (errores.length) return notify(errores.join(" "), true);
    const existing = state.profesionales.find((item) => item.id === data.id);
    const payload = {
      ...(existing || crearProfesionalBase(state)),
      ...data,
      porcentajeJornada: Number(data.porcentajeJornada),
      posicionInicial: Number(data.posicionInicial || 0),
      activo: true,
    };
    if (existing) Object.assign(existing, payload);
    else state.profesionales.push(payload);
    await persist();
  });

  root.querySelector("#turnoForm")?.addEventListener("submit", async (event) => {
    event.preventDefault();
    const data = Object.fromEntries(new FormData(event.currentTarget));
    const existing = state.turnos.find((item) => item.id === data.id);
    const payload = {
      ...(existing || turno(data.codigo, data.nombre, data.inicio, data.fin, data.horasComputables, data.grupoCobertura, data.color, data.cruzaMedianoche === "true")),
      ...data,
      codigo: data.codigo.toUpperCase(),
      horasComputables: Number(data.horasComputables),
      cruzaMedianoche: data.cruzaMedianoche === "true",
    };
    const errores = validarTurno(payload, state.turnos);
    if (errores.length) return notify(errores.join(" "), true);
    if (existing) Object.assign(existing, payload);
    else state.turnos.push(payload);
    await persist();
  });

  root.querySelector("#cicloForm")?.addEventListener("submit", async (event) => {
    event.preventDefault();
    const data = Object.fromEntries(new FormData(event.currentTarget));
    try {
      const codigos = parsearSecuencia(data.secuencia).map((codigo) => codigo.toUpperCase());
      const existing = state.ciclos.find((item) => item.id === data.id);
      if (existing) Object.assign(existing, { nombre: data.nombre, codigos });
      else state.ciclos.push(crearCiclo(data.nombre, codigos, state.turnos));
      await persist();
    } catch (error) {
      notify(error.message, true);
    }
  });

  root.querySelector("#monthSelector")?.addEventListener("change", (event) => {
    selectedMonth = Number(event.target.value);
    recalcAndRender();
  });

  root.querySelector("#importJson")?.addEventListener("change", importarJson);

  root.querySelectorAll("[data-action]").forEach((element) => {
    element.addEventListener("click", handleAction);
  });
}

async function handleAction(event) {
  const action = event.currentTarget.dataset.action;
  const id = event.currentTarget.dataset.id;
  if (action === "clear-prof-form") return fillForm("profesionalForm", crearProfesionalBase(state));
  if (action === "clear-turno-form") return fillForm("turnoForm", {});
  if (action === "clear-ciclo-form") return fillForm("cicloForm", {});
  if (action === "append-turno") {
    const input = root.querySelector("#cicloForm [name='secuencia']");
    input.value = `${input.value}${input.value.trim() ? ", " : ""}${event.currentTarget.dataset.code}`;
  }
  if (action === "edit-prof") return fillForm("profesionalForm", state.profesionales.find((item) => item.id === id));
  if (action === "edit-turno") return fillForm("turnoForm", state.turnos.find((item) => item.id === id));
  if (action === "edit-ciclo") {
    const ciclo = state.ciclos.find((item) => item.id === id);
    return fillForm("cicloForm", { ...ciclo, secuencia: ciclo.codigos.join(", ") });
  }
  if (action === "delete-prof" && confirm("¿Eliminar profesional?")) {
    state.profesionales = state.profesionales.filter((item) => item.id !== id);
    await persist();
  }
  if (action === "delete-turno" && confirm("¿Eliminar o desactivar turno? Si esta en uso se desactivara.")) {
    const enUso = state.ciclos.some((ciclo) => ciclo.codigos.includes(state.turnos.find((t) => t.id === id)?.codigo));
    if (enUso) state.turnos.find((item) => item.id === id).activo = false;
    else state.turnos = state.turnos.filter((item) => item.id !== id);
    await persist();
  }
  if (action === "delete-ciclo" && confirm("¿Eliminar ciclo?")) {
    state.ciclos = state.ciclos.filter((item) => item.id !== id);
    state.profesionales.forEach((p) => { if (p.cicloId === id) p.cicloId = ""; });
    await persist();
  }
  if (action === "duplicate-ciclo") {
    const ciclo = state.ciclos.find((item) => item.id === id);
    state.ciclos.push({ ...structuredClone(ciclo), id: crypto.randomUUID(), nombre: `${ciclo.nombre} copia` });
    await persist();
  }
  if (action === "export-json") {
    descargarJson(`gestor-turnos-${state.config.unidad}-${state.config.anioActivo}.json`, crearBackup(state));
  }
  if (action === "reset-data") {
    if (confirm("Primera confirmacion: se sustituiran los datos locales.") && confirm("Segunda confirmacion: ¿restablecer datos iniciales?")) {
      await clearState();
      state = crearEstadoInicial();
      await persist();
    }
  }
}

function validarProfesional(data) {
  const errores = [];
  if (!data.nombre) errores.push("El nombre es obligatorio.");
  const porcentaje = Number(data.porcentajeJornada);
  if (porcentaje < 1 || porcentaje > 100) errores.push("El porcentaje debe estar entre 1 y 100.");
  if (data.fechaInicio && data.fechaFin && data.fechaFin < data.fechaInicio) errores.push("La fecha final debe ser igual o posterior a la inicial.");
  return errores;
}

function fillForm(formId, data = {}) {
  const form = root.querySelector(`#${formId}`);
  if (!form) return;
  form.reset();
  for (const [key, value] of Object.entries(data)) {
    const input = form.elements[key];
    if (input) input.value = value ?? "";
  }
}

async function importarJson(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const payload = JSON.parse(await file.text());
    const errores = validarBackup(payload);
    if (errores.length) return notify(errores.join(" "), true);
    const resumen = `${payload.data.profesionales.length} profesionales, ${payload.data.turnos.length} turnos, ${payload.data.ciclos.length} ciclos.`;
    if (!confirm(`Importar copia: ${resumen}\nSe descargara antes una copia del estado actual.`)) return;
    descargarJson(`backup-previo-importacion-${Date.now()}.json`, crearBackup(state));
    state = payload.data;
    await persist();
  } catch (error) {
    notify(`No se pudo importar: ${error.message}`, true);
  } finally {
    event.target.value = "";
  }
}

function notify(message, isError = false) {
  const prefix = isError ? "Error" : "Aviso";
  alert(`${prefix}: ${message}`);
}

    </script>
  </body>
